name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Validate payload
        run: |
          for field in formula version sdist_url sdist_sha256; do
            value=$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r ".$field")
            if [ -z "$value" ] || [ "$value" = "null" ]; then
              echo "::error::Missing required field: $field"
              exit 1
            fi
          done
          echo "Updating ${{ github.event.client_payload.formula }} to v${{ github.event.client_payload.version }}"

      - name: Checkout tap
        uses: actions/checkout@v5

      - name: Update formula
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
          SDIST_URL: ${{ github.event.client_payload.sdist_url }}
          SDIST_SHA256: ${{ github.event.client_payload.sdist_sha256 }}
        run: |
          FORMULA_FILE="Formula/${FORMULA}.rb"
          if [ ! -f "$FORMULA_FILE" ]; then
            echo "::error::Formula file not found: $FORMULA_FILE"
            exit 1
          fi

          # Update URL
          sed -i "s|url \".*\"|url \"${SDIST_URL}\"|" "$FORMULA_FILE"
          # Update SHA256
          sed -i "s|sha256 \".*\"|sha256 \"${SDIST_SHA256}\"|" "$FORMULA_FILE"

          echo "Updated $FORMULA_FILE:"
          grep -E '(url|sha256) ' "$FORMULA_FILE"

      - name: Commit and push
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update ${FORMULA} to v${VERSION}"
          git push
